<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO -->
    <title>NetaTrack — India's Political Accountability Platform</title>
    <meta name="description" content="Track criminal records, wealth disclosures, and parliament performance of every MP, MLA, Minister, Mayor, and Sarpanch in India. Powered by ECI affidavit data." />
    <meta name="keywords" content="Indian politicians accountability, MP tracker, MLA records, criminal cases politicians India, political transparency, ECI affidavits, parliament attendance" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://netattrack.in/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://netattrack.in/" />
    <meta property="og:title" content="NetaTrack — India's Political Accountability Platform" />
    <meta property="og:description" content="Transparent, data-driven insights on every MP, MLA, Minister, and local representative across India. Know your representatives. Hold power accountable." />
    <meta property="og:locale" content="en_IN" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#060608" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E8A020'/><text y='.9em' font-size='65' font-family='monospace' font-weight='900' fill='%23060608' x='12'>IN</text></svg>" />

    <!-- Google Fonts — Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" 
      rel="stylesheet" 
    />

      "@context": "https://schema.org",

      "name": "NetaTrack",
      "description": "India's independent civic transparency and political accountability platform",
      "url": "https://netattrack.in",
      "applicationCategory": "GovernmentApplication",

        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
